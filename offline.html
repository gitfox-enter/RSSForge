<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>线报聚合 - 离线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f7f8fa;color:#333;text-align:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:360px;width:100%}
.icon{font-size:48px;margin-bottom:16px}
h1{font-size:20px;font-weight:700;margin-bottom:8px;color:#333}
p{font-size:14px;color:#666;line-height:1.6;margin-bottom:20px}
.btn{display:inline-block;padding:10px 28px;background:#1976d2;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s}
.btn:hover{background:#1565c0}
@media(prefers-color-scheme:dark){body{background:#1a1a2e}.card{background:#16213e}h1{color:#e0e0e0}p{color:#aaa}}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>当前无法连接网络</h1>
  <p>线报聚合需要联网才能获取最新线报数据。请检查网络连接后重试。</p>
  <button class="btn" onclick="location.reload()">重新加载</button>
</div>
</body>
</html>
