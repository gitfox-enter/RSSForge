<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线报聚合 - 全网羊毛线报实时聚合</title>
<meta name="description" content="聚合全网优质羊毛线报，自动抓取实时更新，告别垃圾站">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== CSS RESET & CUSTOM PROPERTIES ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #e85d04;
  --primary-dark: #c94d03;
  --primary-light: #fff0e6;
  --primary-gradient: linear-gradient(135deg, #e85d04 0%, #dc2f02 50%, #d00000 100%);
  --bg: #f5f0eb;
  --bg-alt: #ede7e0;
  --surface: #ffffff;
  --surface-hover: #fffbf7;
  --text: #1a1a1a;
  --text-secondary: #555;
  --text-muted: #999;
  --text-light: #bbb;
  --border: #e8e0d8;
  --border-light: #f0ebe5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-primary: 0 4px 20px rgba(232,93,4,0.25);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --header-height: 60px;
  --filter-height: 52px;
  --max-width: 860px;
  --transition: 0.2s ease;
  --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ========== BASE ========== */
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

body {
  font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: inherit; text-decoration: none; }

/* ========== HEADER ========== */
.header {
  background: var(--primary);
  color: #fff;
  height: var(--header-height);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 16px rgba(232,93,4,0.35);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  white-space: nowrap;
}

.badge-auto {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-count {
  font-size: 13px;
  opacity: 0.9;
  white-space: nowrap;
}

.btn-settings {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  font-size: 18px;
  flex-shrink: 0;
}

.btn-settings:hover { background: rgba(255,255,255,0.3); }

/* ========== SEARCH BAR ========== */
.search-wrap {
  position: relative;
  max-width: 320px;
  flex: 1;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  opacity: 0.5;
  pointer-events: none;
}

.search-input {
  width: 100%;
  height: 38px;
  border: none;
  border-radius: 20px;
  padding: 0 36px 0 36px;
  font-size: 14px;
  font-family: inherit;
  background: rgba(255,255,255,0.18);
  color: #fff;
  outline: none;
  transition: background var(--transition), box-shadow var(--transition);
}

.search-input::placeholder { color: rgba(255,255,255,0.6); }
.search-input:focus {
  background: rgba(255,255,255,0.28);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
}

.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.3);
  border: none;
  color: #fff;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 12px;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}

.search-clear.visible { display: flex; }
.search-clear:hover { background: rgba(255,255,255,0.5); }

/* ========== HERO ========== */
.hero {
  background: var(--primary-gradient);
  color: #fff;
  padding: 40px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  top: -40%;
  right: -10%;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  pointer-events: none;
}

.hero::after {
  content: "";
  position: absolute;
  bottom: -30%;
  left: -5%;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
  pointer-events: none;
}

.hero-content { position: relative; z-index: 1; }

.hero h1 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.hero-subtitle {
  font-size: 14px;
  opacity: 0.85;
  max-width: 440px;
  margin: 0 auto 16px;
  line-height: 1.7;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  font-size: 13px;
  opacity: 0.8;
}

.hero-stat {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hero-stat svg {
  width: 14px;
  height: 14px;
  opacity: 0.7;
}

/* ========== FILTER BAR ========== */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: var(--header-height);
  z-index: 150;
  box-shadow: var(--shadow-sm);
}

.filter-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  align-items: center;
  height: var(--filter-height);
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.filter-inner::-webkit-scrollbar { display: none; }

.filter-tab {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  transition: all var(--transition);
  flex-shrink: 0;
  font-family: inherit;
  user-select: none;
}

.filter-tab:hover {
  background: var(--primary-light);
  color: var(--primary);
}

.filter-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(232,93,4,0.25);
}

.filter-tab .tab-count {
  display: inline-block;
  margin-left: 4px;
  font-size: 11px;
  opacity: 0.75;
}

/* ========== MAIN CONTENT ========== */
.main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 16px 16px 80px;
}

/* ========== STATUS BAR ========== */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-muted);
}

.status-bar .search-result-info { color: var(--primary); font-weight: 500; }

/* ========== ITEM LIST ========== */
.item-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.item-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  text-decoration: none;
  color: var(--text);
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
}

.item-card:hover {
  border-color: var(--primary);
  background: var(--surface-hover);
  transform: translateX(4px);
  box-shadow: var(--shadow-md);
}

.item-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 8px;
  flex-shrink: 0;
  transition: transform var(--transition);
}

.item-card:hover .item-dot { transform: scale(1.4); }

.item-body {
  flex: 1;
  min-width: 0;
}

.item-title {
  font-size: 14.5px;
  font-weight: 500;
  line-height: 1.6;
  color: var(--text);
  word-break: break-all;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.item-card:hover .item-title { color: var(--primary); }

.item-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}

.item-source {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: 0.2px;
}

.item-time {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ========== LOAD MORE ========== */
.load-more-wrap {
  text-align: center;
  padding: 24px 0;
}

.btn-load-more {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 10px 32px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-load-more:hover {
  border-color: var(--primary);
  color: var(--primary);
  box-shadow: var(--shadow);
}

/* ========== LOADING SPINNER ========== */
.loading {
  text-align: center;
  padding: 60px 20px;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 14px;
  color: var(--text-muted);
}

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.empty-desc {
  font-size: 13px;
  color: var(--text-muted);
}

/* ========== SENTINEL (for IntersectionObserver) ========== */
.scroll-sentinel {
  height: 1px;
  width: 100%;
}

/* ========== BACK TO TOP ========== */
.back-to-top {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  cursor: pointer;
  box-shadow: var(--shadow-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transform: translateY(12px);
  transition: all var(--transition-slow);
  z-index: 100;
}

.back-to-top.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.back-to-top:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(232,93,4,0.35);
}

.back-to-top svg { width: 20px; height: 20px; }

/* ========== FOOTER ========== */
.footer {
  text-align: center;
  padding: 28px 16px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.footer a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
}

.footer a:hover { text-decoration: underline; }

/* ========== SETTINGS MODAL ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all var(--transition-slow);
}

.modal-overlay.open {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px) scale(0.97);
  transition: transform var(--transition-slow);
}

.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border-light);
}

.modal-header h2 {
  font-size: 18px;
  font-weight: 700;
}

.modal-close {
  background: none;
  border: none;
  font-size: 22px;
  color: var(--text-muted);
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: all var(--transition);
}

.modal-close:hover { background: var(--bg); color: var(--text); }

.modal-body { padding: 20px 24px; }

.modal-section { margin-bottom: 24px; }

.modal-section:last-child { margin-bottom: 0; }

.modal-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.custom-cat-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.custom-cat-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  font-size: 13px;
}

.custom-cat-info {
  flex: 1;
  min-width: 0;
}

.custom-cat-name {
  font-weight: 600;
  color: var(--text);
}

.custom-cat-keywords {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
  word-break: break-all;
}

.custom-cat-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  margin-left: 12px;
}

.custom-cat-actions button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.custom-cat-actions button:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.custom-cat-actions .btn-del:hover {
  border-color: #d00000;
  color: #d00000;
}

.add-cat-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.form-group input {
  width: 100%;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 12px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
}

.form-group input:focus { border-color: var(--primary); }

.form-group input::placeholder { color: var(--text-light); }

.btn-add-cat {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition);
  align-self: flex-start;
}

.btn-add-cat:hover { background: var(--primary-dark); }

.no-custom-cats {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  padding: 16px;
}

/* ========== SOURCE COLORS ========== */
.src-color-0  { background: #fff0e6; color: #e85d04; }
.src-color-1  { background: #e8f5e9; color: #2e7d32; }
.src-color-2  { background: #e3f2fd; color: #1565c0; }
.src-color-3  { background: #fce4ec; color: #c62828; }
.src-color-4  { background: #f3e5f5; color: #7b1fa2; }
.src-color-5  { background: #e0f2f1; color: #00695c; }
.src-color-6  { background: #fff3e0; color: #e65100; }
.src-color-7  { background: #e8eaf6; color: #283593; }
.src-color-8  { background: #fbe9e7; color: #bf360c; }
.src-color-9  { background: #e1f5fe; color: #0277bd; }
.src-color-10 { background: #f1f8e9; color: #33691e; }
.src-color-11 { background: #fff8e1; color: #f57f17; }

.dot-color-0  { background: #e85d04; }
.dot-color-1  { background: #2e7d32; }
.dot-color-2  { background: #1565c0; }
.dot-color-3  { background: #c62828; }
.dot-color-4  { background: #7b1fa2; }
.dot-color-5  { background: #00695c; }
.dot-color-6  { background: #e65100; }
.dot-color-7  { background: #283593; }
.dot-color-8  { background: #bf360c; }
.dot-color-9  { background: #0277bd; }
.dot-color-10 { background: #33691e; }
.dot-color-11 { background: #f57f17; }

/* ========== ERROR STATE ========== */
.error-state {
  text-align: center;
  padding: 60px 20px;
}

.error-icon { font-size: 48px; margin-bottom: 16px; }

.error-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.error-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.btn-retry {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 28px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition);
}

.btn-retry:hover { background: var(--primary-dark); }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .header { padding: 0 12px; }
  .header-count { display: none; }
  .search-wrap { max-width: 180px; }
  .hero { padding: 28px 16px; }
  .hero h1 { font-size: 20px; }
  .hero-subtitle { font-size: 13px; }
  .hero-stats { gap: 16px; font-size: 12px; }
  .main { padding: 12px 10px 80px; }
  .item-card { padding: 12px 14px; gap: 10px; }
  .item-meta { display: none; }
  .item-title { font-size: 14px; -webkit-line-clamp: 3; }
  .filter-inner { padding: 0 10px; }
  .back-to-top { bottom: 20px; right: 16px; width: 40px; height: 40px; }
  .modal { width: 95%; }
}

@media (min-width: 769px) {
  .item-meta { min-width: 120px; }
}

/* ========== ANIMATIONS ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.item-card { animation: fadeInUp 0.3s ease both; }

/* stagger via JS inline style */
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-left">
    <div class="logo">&#x1F525; 线报聚合</div>
    <span class="badge-auto">自动更新</span>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索线报..." autocomplete="off">
    <button class="search-clear" id="searchClear" title="清除">&times;</button>
  </div>
  <div class="header-right">
    <span class="header-count" id="headerCount"></span>
    <button class="btn-settings" id="btnSettings" title="自定义分类">&#9881;</button>
  </div>
</header>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-content">
    <h1>全网羊毛线报实时聚合</h1>
    <p class="hero-subtitle">自动抓取多个线报站点，智能过滤去重，只保留真实有价值的优惠线报</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="heroTime">加载中...</span>
      </div>
      <div class="hero-stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span id="heroTotal">共收录 -- 条</span>
      </div>
    </div>
  </div>
</section>

<!-- ===== FILTER BAR ===== -->
<nav class="filter-bar">
  <div class="filter-inner" id="filterTabs"></div>
</nav>

<!-- ===== MAIN ===== -->
<main class="main" id="mainContent">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text">正在加载线报数据...</div>
  </div>
</main>

<!-- ===== BACK TO TOP ===== -->
<button class="back-to-top" id="backToTop" title="回到顶部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <p>自动更新 &middot; 永不停止 &middot; <a href="https://github.com/gitfox-enter/site-update-monitor" target="_blank" rel="noopener">GitHub</a></p>
</footer>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>&#9881; 自定义分类</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>已有自定义分类</h3>
        <div id="customCatList"></div>
      </div>
      <div class="modal-section">
        <h3>添加新分类</h3>
        <div class="add-cat-form" id="addCatForm">
          <div class="form-group">
            <label for="catName">分类名称</label>
            <input type="text" id="catName" placeholder="如：数码产品">
          </div>
          <div class="form-group">
            <label for="catKeywords">关键词（逗号分隔）</label>
            <input type="text" id="catKeywords" placeholder="如：手机,电脑,耳机,数码">
          </div>
          <button class="btn-add-cat" id="btnAddCat">添加分类</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   线报聚合 - 主应用逻辑
   ================================================================ */
(function () {
  "use strict";

  /* ---- Constants ---- */
  var PAGE_SIZE = 30;
  var DEBOUNCE_MS = 250;

  /* ---- Built-in keyword categories ---- */
  var BUILTIN_CATEGORIES = [
    { name: "京东",   keywords: ["京东"] },
    { name: "淘宝",   keywords: ["淘宝"] },
    { name: "拼多多", keywords: ["拼多多", "拼夕夕"] },
    { name: "外卖",   keywords: ["外卖", "美团", "饿了么", "闪购"] },
    { name: "红包",   keywords: ["红包", "虹包", "鸿包"] },
    { name: "优惠券", keywords: ["优惠券", "券", "消费券", "叠加卷"] }
  ];

  /* ---- State ---- */
  var allItems = [];
  var updatedAt = "";
  var sourceMap = {};         // source -> colorIndex
  var customCategories = [];  // { name, keywords:[] }
  var activeFilter = "all";   // "all" | "src:xxx" | "kw:xxx" | "custom:xxx"
  var searchQuery = "";
  var filteredItems = [];
  var displayedCount = 0;
  var isLoading = false;

  /* ---- DOM refs ---- */
  var $loadingState   = document.getElementById("loadingState");
  var $mainContent    = document.getElementById("mainContent");
  var $filterTabs     = document.getElementById("filterTabs");
  var $searchInput    = document.getElementById("searchInput");
  var $searchClear    = document.getElementById("searchClear");
  var $headerCount    = document.getElementById("headerCount");
  var $heroTime       = document.getElementById("heroTime");
  var $heroTotal      = document.getElementById("heroTotal");
  var $backToTop      = document.getElementById("backToTop");
  var $modalOverlay   = document.getElementById("modalOverlay");
  var $customCatList  = document.getElementById("customCatList");
  var $catName        = document.getElementById("catName");
  var $catKeywords    = document.getElementById("catKeywords");

  /* ---- Utility ---- */
  function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function debounce(fn, ms) {
    var timer;
    return function () {
      var ctx = this, args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function () { fn.apply(ctx, args); }, ms);
    };
  }

  function getSourceColorIndex(source) {
    if (!(source in sourceMap)) {
      sourceMap[source] = Object.keys(sourceMap).length % 12;
    }
    return sourceMap[source];
  }

  function formatRelativeTime(timeStr) {
    if (!timeStr) return "";
    var d = new Date(timeStr.replace(" ", "T"));
    if (isNaN(d.getTime())) return timeStr;
    var now = new Date();
    var diffMs = now - d;
    var diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return "刚刚";
    if (diffMin < 60) return diffMin + " 分钟前";
    var diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + " 小时前";
    var diffDay = Math.floor(diffHr / 24);
    if (diffDay < 7) return diffDay + " 天前";
    return timeStr.slice(5, 16);
  }

  /* ---- Data fetching ---- */
  function fetchData() {
    isLoading = true;
    showLoading();
    fetch("items.json?t=" + Date.now())
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        allItems = data.items || [];
        updatedAt = data.updated_at || "";
        isLoading = false;
        init();
      })
      .catch(function (err) {
        isLoading = false;
        showError(err.message);
      });
  }

  /* ---- Initialization after data load ---- */
  function init() {
    // Pre-compute source colors
    allItems.forEach(function (item) {
      getSourceColorIndex(item.source || "未知");
    });

    updateHeroStats();
    buildFilterTabs();
    applyFilters();
    restoreHashState();
  }

  /* ---- Hero / header stats ---- */
  function updateHeroStats() {
    $heroTime.textContent = "最后更新：" + (updatedAt || "未知");
    $heroTotal.textContent = "共收录 " + allItems.length + " 条";
    $headerCount.textContent = allItems.length + " 条线报";
  }

  /* ---- Filter tabs ---- */
  function buildFilterTabs() {
    var html = "";

    // "全部" tab
    html += '<button class="filter-tab active" data-filter="all">全部<span class="tab-count">' + allItems.length + "</span></button>";

    // Source tabs
    var sourceCounts = {};
    allItems.forEach(function (item) {
      var s = item.source || "未知";
      sourceCounts[s] = (sourceCounts[s] || 0) + 1;
    });
    var sources = Object.keys(sourceCounts).sort(function (a, b) {
      return sourceCounts[b] - sourceCounts[a];
    });
    sources.forEach(function (s) {
      var key = "src:" + s;
      html += '<button class="filter-tab" data-filter="' + escapeHtml(key) + '">' + escapeHtml(s) + '<span class="tab-count">' + sourceCounts[s] + "</span></button>";
    });

    // Built-in keyword categories
    BUILTIN_CATEGORIES.forEach(function (cat) {
      var count = countKeywordMatch(cat.keywords);
      if (count > 0) {
        var key = "kw:" + cat.name;
        html += '<button class="filter-tab" data-filter="' + escapeHtml(key) + '">' + escapeHtml(cat.name) + '<span class="tab-count">' + count + "</span></button>";
      }
    });

    // Custom categories
    customCategories.forEach(function (cat) {
      var count = countKeywordMatch(cat.keywords);
      var key = "custom:" + cat.name;
      html += '<button class="filter-tab" data-filter="' + escapeHtml(key) + '">' + escapeHtml(cat.name) + '<span class="tab-count">' + count + "</span></button>";
    });

    $filterTabs.innerHTML = html;

    // Attach click events
    var tabs = $filterTabs.querySelectorAll(".filter-tab");
    tabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        setFilter(this.getAttribute("data-filter"));
      });
    });
  }

  function countKeywordMatch(keywords) {
    var count = 0;
    allItems.forEach(function (item) {
      var text = (item.text || "").toLowerCase();
      for (var i = 0; i < keywords.length; i++) {
        if (text.indexOf(keywords[i].toLowerCase()) !== -1) {
          count++;
          break;
        }
      }
    });
    return count;
  }

  function setFilter(filter) {
    activeFilter = filter;
    // Update active tab styling
    var tabs = $filterTabs.querySelectorAll(".filter-tab");
    tabs.forEach(function (tab) {
      if (tab.getAttribute("data-filter") === filter) {
        tab.classList.add("active");
      } else {
        tab.classList.remove("active");
      }
    });
    saveHashState();
    applyFilters();
  }

  /* ---- Filtering + Search ---- */
  function applyFilters() {
    var query = searchQuery.toLowerCase().trim();

    filteredItems = allItems.filter(function (item) {
      var text = (item.text || "").toLowerCase();
      var source = (item.source || "").toLowerCase();

      // Search filter
      if (query) {
        var searchMatch = text.indexOf(query) !== -1 || source.indexOf(query) !== -1;
        if (!searchMatch) return false;
      }

      // Category filter
      if (activeFilter === "all") return true;

      if (activeFilter.indexOf("src:") === 0) {
        var srcName = activeFilter.slice(4);
        return (item.source || "未知") === srcName;
      }

      if (activeFilter.indexOf("kw:") === 0) {
        var catName = activeFilter.slice(3);
        var cat = null;
        for (var i = 0; i < BUILTIN_CATEGORIES.length; i++) {
          if (BUILTIN_CATEGORIES[i].name === catName) { cat = BUILTIN_CATEGORIES[i]; break; }
        }
        if (!cat) return true;
        for (var j = 0; j < cat.keywords.length; j++) {
          if (text.indexOf(cat.keywords[j].toLowerCase()) !== -1) return true;
        }
        return false;
      }

      if (activeFilter.indexOf("custom:") === 0) {
        var customName = activeFilter.slice(7);
        var customCat = null;
        for (var k = 0; k < customCategories.length; k++) {
          if (customCategories[k].name === customName) { customCat = customCategories[k]; break; }
        }
        if (!customCat) return true;
        for (var m = 0; m < customCat.keywords.length; m++) {
          if (text.indexOf(customCat.keywords[m].toLowerCase()) !== -1) return true;
        }
        return false;
      }

      return true;
    });

    displayedCount = 0;
    renderItems();
  }

  /* ---- Rendering ---- */
  function renderItems() {
    var total = filteredItems.length;
    var toShow = Math.min(displayedCount + PAGE_SIZE, total);

    var html = "";

    // Status bar
    html += '<div class="status-bar">';
    if (searchQuery) {
      html += '<span class="search-result-info">搜索 "' + escapeHtml(searchQuery) + '" 找到 ' + total + " 条结果</span>";
    } else {
      html += "<span>共 " + total + " 条线报</span>";
    }
    html += '<span id="displayCounter">显示 ' + toShow + " / " + total + " 条</span>";
    html += "</div>";

    if (total === 0) {
      html += '<div class="empty-state">';
      html += '<div class="empty-icon">&#x1F50D;</div>';
      html += '<div class="empty-title">没有找到相关线报</div>';
      html += '<div class="empty-desc">试试其他关键词或切换分类</div>';
      html += "</div>";
    } else {
      html += '<div class="item-list" id="itemList">';
      for (var i = 0; i < toShow; i++) {
        var item = filteredItems[i];
        var srcIdx = getSourceColorIndex(item.source || "未知");
        var delay = Math.min(i, 10) * 0.03;
        html += renderItemCard(item, srcIdx, delay);
      }
      html += "</div>";

      // Load more
      if (toShow < total) {
        html += '<div class="load-more-wrap">';
        html += '<button class="btn-load-more" id="btnLoadMore">加载更多 (' + (total - toShow) + " 条)</button>";
        html += "</div>";
        html += '<div class="scroll-sentinel" id="scrollSentinel"></div>';
      }
    }

    $mainContent.innerHTML = html;
    displayedCount = toShow;

    // Rebind load more
    var $btn = document.getElementById("btnLoadMore");
    if ($btn) {
      $btn.addEventListener("click", function () { loadMore(); });
    }

    // Setup intersection observer
    setupInfiniteScroll();
  }

  function renderItemCard(item, srcIdx, delay) {
    var url = escapeHtml(item.url || "#");
    var text = escapeHtml(item.text || "无线报标题");
    var source = escapeHtml(item.source || "未知");
    var time = formatRelativeTime(item.time);
    var timeRaw = item.time ? item.time.slice(5, 16) : "";

    var s = "";
    s += '<a href="' + url + '" target="_blank" rel="noopener" class="item-card" style="animation-delay:' + delay.toFixed(2) + 's">';
    s += '<div class="item-dot dot-color-' + srcIdx + '"></div>';
    s += '<div class="item-body">';
    s += '<div class="item-title">' + text + '</div>';
    s += '</div>';
    s += '<div class="item-meta">';
    s += '<span class="item-source src-color-' + srcIdx + '">' + source + '</span>';
    s += '<span class="item-time" title="' + escapeHtml(timeRaw) + '">' + escapeHtml(time) + '</span>';
    s += '</div>';
    s += '</a>';
    return s;
  }

  function loadMore() {
    var total = filteredItems.length;
    if (displayedCount >= total) return;

    var toShow = Math.min(displayedCount + PAGE_SIZE, total);
    var $list = document.getElementById("itemList");
    if (!$list) return;

    var fragment = "";
    for (var i = displayedCount; i < toShow; i++) {
      var item = filteredItems[i];
      var srcIdx = getSourceColorIndex(item.source || "未知");
      fragment += renderItemCard(item, srcIdx, 0);
    }
    $list.insertAdjacentHTML("beforeend", fragment);
    displayedCount = toShow;

    // Update counter
    var $counter = document.getElementById("displayCounter");
    if ($counter) $counter.textContent = "显示 " + toShow + " / " + total + " 条";

    // Update/remove load-more button
    var $btnWrap = document.querySelector(".load-more-wrap");
    if (toShow >= total && $btnWrap) {
      $btnWrap.remove();
    } else if ($btnWrap) {
      var $btn = $btnWrap.querySelector(".btn-load-more");
      if ($btn) $btn.textContent = "加载更多 (" + (total - toShow) + " 条)";
    }

    setupInfiniteScroll();
  }

  /* ---- Infinite Scroll ---- */
  var observer = null;

  function setupInfiniteScroll() {
    if (observer) observer.disconnect();

    var sentinel = document.getElementById("scrollSentinel");
    if (!sentinel) return;

    observer = new IntersectionObserver(function (entries) {
      if (entries[0].isIntersecting) {
        loadMore();
      }
    }, { rootMargin: "200px" });

    observer.observe(sentinel);
  }

  /* ---- UI states ---- */
  function showLoading() {
    $mainContent.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">正在加载线报数据...</div></div>';
  }

  function showError(msg) {
    $mainContent.innerHTML =
      '<div class="error-state">' +
      '<div class="error-icon">&#x26A0;&#xFE0F;</div>' +
      '<div class="error-title">数据加载失败</div>' +
      '<div class="error-desc">' + escapeHtml(msg) + ' - 请确保 items.json 文件存在且格式正确</div>' +
      '<button class="btn-retry" onclick="location.reload()">重新加载</button>' +
      '</div>';
  }

  /* ---- Search ---- */
  var debouncedSearch = debounce(function () {
    searchQuery = $searchInput.value.trim();
    $searchClear.classList.toggle("visible", searchQuery.length > 0);
    applyFilters();
  }, DEBOUNCE_MS);

  $searchInput.addEventListener("input", debouncedSearch);

  $searchClear.addEventListener("click", function () {
    $searchInput.value = "";
    searchQuery = "";
    $searchClear.classList.remove("visible");
    applyFilters();
    $searchInput.focus();
  });

  /* ---- Back to Top ---- */
  window.addEventListener("scroll", function () {
    $backToTop.classList.toggle("visible", window.scrollY > 400);
  }, { passive: true });

  $backToTop.addEventListener("click", function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  /* ---- URL Hash State ---- */
  function saveHashState() {
    var hash = "";
    if (activeFilter && activeFilter !== "all") hash += "f=" + encodeURIComponent(activeFilter);
    if (searchQuery) hash += (hash ? "&" : "") + "q=" + encodeURIComponent(searchQuery);
    history.replaceState(null, "", hash ? "#" + hash : window.location.pathname);
  }

  function restoreHashState() {
    var hash = window.location.hash.slice(1);
    if (!hash) return;
    var params = {};
    hash.split("&").forEach(function (part) {
      var kv = part.split("=");
      if (kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
    });
    if (params.q) {
      $searchInput.value = params.q;
      searchQuery = params.q;
      $searchClear.classList.add("visible");
    }
    if (params.f) {
      setFilter(params.f);
    } else {
      applyFilters();
    }
  }

  /* ---- Settings Modal ---- */
  document.getElementById("btnSettings").addEventListener("click", function () {
    renderCustomCatList();
    $modalOverlay.classList.add("open");
  });

  document.getElementById("modalClose").addEventListener("click", closeModal);

  $modalOverlay.addEventListener("click", function (e) {
    if (e.target === $modalOverlay) closeModal();
  });

  function closeModal() {
    $modalOverlay.classList.remove("open");
  }

  function renderCustomCatList() {
    if (customCategories.length === 0) {
      $customCatList.innerHTML = '<div class="no-custom-cats">暂无自定义分类，请在下方添加</div>';
      return;
    }
    var html = '<div class="custom-cat-list">';
    customCategories.forEach(function (cat, idx) {
      html += '<div class="custom-cat-item">';
      html += '<div class="custom-cat-info">';
      html += '<div class="custom-cat-name">' + escapeHtml(cat.name) + '</div>';
      html += '<div class="custom-cat-keywords">' + escapeHtml(cat.keywords.join(", ")) + '</div>';
      html += '</div>';
      html += '<div class="custom-cat-actions">';
      html += '<button onclick="window._editCat(' + idx + ')">编辑</button>';
      html += '<button class="btn-del" onclick="window._deleteCat(' + idx + ')">删除</button>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    $customCatList.innerHTML = html;
  }

  // Add category
  document.getElementById("btnAddCat").addEventListener("click", function () {
    var name = $catName.value.trim();
    var kwStr = $catKeywords.value.trim();
    if (!name || !kwStr) return;
    var keywords = kwStr.split(/[,，]/).map(function (k) { return k.trim(); }).filter(Boolean);
    if (keywords.length === 0) return;
    customCategories.push({ name: name, keywords: keywords });
    $catName.value = "";
    $catKeywords.value = "";
    renderCustomCatList();
    buildFilterTabs();
    applyFilters();
  });

  // Expose edit/delete to global scope for inline onclick
  window._deleteCat = function (idx) {
    customCategories.splice(idx, 1);
    renderCustomCatList();
    buildFilterTabs();
    applyFilters();
  };

  window._editCat = function (idx) {
    var cat = customCategories[idx];
    $catName.value = cat.name;
    $catKeywords.value = cat.keywords.join(", ");
    customCategories.splice(idx, 1);
    renderCustomCatList();
    buildFilterTabs();
    applyFilters();
    $catName.focus();
  };

  /* ---- Keyboard shortcut: Escape to close modal ---- */
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && $modalOverlay.classList.contains("open")) {
      closeModal();
    }
  });

  /* ---- Start ---- */
  fetchData();

})();
</script>
</body>
</html>
