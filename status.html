<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>线报聚合 - 运维看板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#1976d2;--primary-light:#e3f2fd;--success:#2e7d32;--success-light:#e8f5e9;
    --warn:#e65100;--warn-light:#fff3e0;--error:#c62828;--error-light:#ffebee;
    --dead:#616161;--dead-light:#f5f5f5;--bg:#f5f5f5;--card:#fff;--text:#333;--text2:#666;--text3:#999;--border:#eee;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1a1a2e;--card:#16213e;--text:#e0e0e0;--text2:#aaa;--text3:#777;--border:#2a2a4a;--primary-light:#1a237e33;--success-light:#1b5e2033;--warn-light:#e6510033;--error-light:#c6282833;--dead-light:#61616133}
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:var(--bg);color:var(--text);max-width:1100px;margin:0 auto;padding:20px}
  a{color:var(--primary);text-decoration:none}
  h1{font-size:1.4rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  h1 .icon{font-size:1.2rem}
  .card{background:var(--card);border-radius:10px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .card h2{font-size:1rem;margin-bottom:12px;color:var(--text2);font-weight:600;display:flex;align-items:center;gap:6px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
  .stat{text-align:center;padding:14px 8px;border-radius:8px}
  .stat .num{font-size:1.8rem;font-weight:700}
  .stat .label{font-size:.7rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .stat.primary .num{color:var(--primary)}.stat.primary{background:var(--primary-light)}
  .stat.success .num{color:var(--success)}.stat.success{background:var(--success-light)}
  .stat.error .num{color:var(--error)}.stat.error{background:var(--error-light)}
  .stat.warn .num{color:var(--warn)}.stat.warn{background:var(--warn-light)}
  .stat.dead .num{color:var(--dead)}.stat.dead{background:var(--dead-light)}
  .updated{font-size:.75rem;color:var(--text3);margin-bottom:8px}

  /* Tier bar */
  .tier-bar{display:flex;height:24px;border-radius:12px;overflow:hidden;margin:8px 0 4px}
  .tier-bar div{display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:#fff;min-width:30px;transition:width .3s}
  .tier-bar .th{background:var(--primary)}.tier-bar .tm{background:#ff9800}.tier-bar .tl{background:#9e9e9e}.tier-bar .td{background:#424242}

  /* Site table */
  .site-table{width:100%;border-collapse:collapse;font-size:.82rem}
  .site-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--text3);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
  .site-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  .site-table tr:hover{background:var(--primary-light)}
  .site-name{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;white-space:nowrap}
  .badge.ok{background:var(--success-light);color:var(--success)}
  .badge.fail{background:var(--error-light);color:var(--error)}
  .badge.skip{background:var(--warn-light);color:var(--warn)}
  .badge.dead{background:var(--dead-light);color:var(--dead)}
  .rt-bar{display:inline-block;height:6px;border-radius:3px;background:var(--success);min-width:2px;max-width:80px;vertical-align:middle;margin-right:4px}
  .rt-bar.slow{background:var(--warn)}.rt-bar.timeout{background:var(--error)}

  /* Error tooltip */
  .err-tip{cursor:help;border-bottom:1px dashed var(--text3);color:var(--text3);font-size:.72rem}

  .back{display:inline-flex;align-items:center;gap:4px;margin-bottom:16px;font-size:.9rem}
  .empty{color:var(--text3);text-align:center;padding:40px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:.72rem;color:var(--text3);margin-top:8px}
  .legend span{display:flex;align-items:center;gap:4px}
  .legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<a class="back" href="./">&larr; 返回主页</a>
<h1><span class="icon">🩺</span> 运维看板</h1>
<div id="status" class="empty">加载中...</div>

<script>
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

fetch('crawl_status.json?t='+Date.now())
  .then(function(r){return r.json()})
  .then(function(data){
    var el=document.getElementById('status');
    if(!data||!data.last_run){el.textContent='暂无爬虫运行数据';return}
    var run=data.last_run,sites=data.sites||[];
    var ok=sites.filter(function(s){return s.status==='ok'}).length;
    var fail=sites.filter(function(s){return s.status==='fail'}).length;
    var skip=sites.filter(function(s){return s.status==='skip'}).length;
    var dead=sites.filter(function(s){return s.status==='dead'}).length;
    var avgRt=sites.filter(function(s){return s.response_time}).reduce(function(a,s){return a+s.response_time},0)/(ok||1);

    var h='<div class="updated">最后运行: '+esc(run.check_time||'-')+'</div>';

    // Overview
    h+='<div class="card"><h2>📊 运行概览</h2><div class="grid">';
    h+='<div class="stat primary"><div class="num">'+sites.length+'</div><div class="label">总站点</div></div>';
    h+='<div class="stat success"><div class="num">'+ok+'</div><div class="label">成功</div></div>';
    h+='<div class="stat error"><div class="num">'+fail+'</div><div class="label">失败</div></div>';
    h+='<div class="stat warn"><div class="num">'+skip+'</div><div class="label">跳过</div></div>';
    h+='<div class="stat dead"><div class="num">'+dead+'</div><div class="label">死站</div></div>';
    h+='<div class="stat primary"><div class="num">'+(run.new_items||0)+'</div><div class="label">新条目</div></div>';
    h+='<div class="stat primary"><div class="num">'+(run.total_items||0)+'</div><div class="label">总条目</div></div>';
    h+='<div class="stat '+(avgRt>5000?'warn':'success')+'"><div class="num">'+Math.round(avgRt/1000)+'s</div><div class="label">平均响应</div></div>';
    h+='</div></div>';

    // Tier distribution
    var total=sites.length||1;
    var okPct=Math.round(ok/total*100),failPct=Math.round(fail/total*100),skipPct=Math.round(skip/total*100),deadPct=Math.round(dead/total*100);
    h+='<div class="card"><h2>📈 站点健康度</h2>';
    h+='<div class="tier-bar">';
    if(ok)h+='<div class="th" style="width:'+okPct+'%">'+ok+' OK</div>';
    if(fail)h+='<div class="tm" style="width:'+failPct+'%">'+fail+' FAIL</div>';
    if(skip)h+='<div class="tl" style="width:'+skipPct+'%">'+skip+' SKIP</div>';
    if(dead)h+='<div class="td" style="width:'+deadPct+'%">'+dead+' DEAD</div>';
    h+='</div>';
    h+='<div class="legend"><span><span class="dot" style="background:var(--primary)"></span>成功 '+okPct+'%</span><span><span class="dot" style="background:#ff9800"></span>失败 '+failPct+'%</span><span><span class="dot" style="background:#9e9e9e"></span>跳过 '+skipPct+'%</span><span><span class="dot" style="background:#424242"></span>死站 '+deadPct+'%</span></div>';
    h+='</div>';

    // Site details
    h+='<div class="card"><h2>🔍 站点详情</h2>';
    if(!sites.length){h+='<div class="empty">暂无站点数据</div>'}
    else{
      sites.sort(function(a,b){var o={dead:0,fail:1,skip:2,ok:3};return(o[a.status]||3)-(o[b.status]||3)});
      h+='<table class="site-table"><thead><tr><th>站点</th><th>状态</th><th>响应时间</th><th>备注</th></tr></thead><tbody>';
      sites.forEach(function(s){
        var cls=s.status==='ok'?'ok':(s.status==='fail'?'fail':(s.status==='dead'?'dead':'skip'));
        var label=s.status==='ok'?'OK':(s.status==='fail'?'FAIL':(s.status==='dead'?'DEAD':'SKIP'));
        var rt=s.response_time?Math.round(s.response_time/1000*10)/10:'-';
        var rtBar='';
        if(s.response_time){
          var w=Math.min(Math.round(s.response_time/100),80);
          var barCls=w>20?'slow':(w>40?'timeout':'');
          rtBar='<span class="rt-bar '+barCls+'" style="width:'+w+'px"></span>';
        }
        var err=s.error?'<span class="err-tip" title="'+esc(s.error)+'">'+esc(s.error.substring(0,30))+'</span>':'-';
        h+='<tr><td class="site-name">'+esc(s.name||s.url)+'</td><td><span class="badge '+cls+'">'+label+'</span></td><td>'+rtBar+rt+'s</td><td>'+err+'</td></tr>';
      });
      h+='</tbody></table>';
    }
    h+='</div>';

    // Metrics
    if(run.metrics){
      var m=run.metrics;
      h+='<div class="card"><h2>⚡ 请求指标</h2><div class="grid">';
      h+='<div class="stat primary"><div class="num">'+(m.total_requests||0)+'</div><div class="label">总请求</div></div>';
      h+='<div class="stat success"><div class="num">'+(m.success_count||0)+'</div><div class="label">成功</div></div>';
      h+='<div class="stat error"><div class="num">'+(m.fail_count||0)+'</div><div class="label">失败</div></div>';
      h+='</div></div>';
    }

    el.className='';
    el.innerHTML=h;
  })
  .catch(function(){document.getElementById('status').textContent='加载失败，请检查 crawl_status.json'});
</script>
</body>
</html>
