name: 测试邮件发送

on:
  workflow_dispatch:

jobs:
  test-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: 运行邮件测试
        env:
          CLAW_AUTH_URL: ${{ secrets.CLAW_AUTH_URL }}
          CLAWEMAIL_API_KEY: ${{ secrets.CLAWEMAIL_API_KEY }}
          CLAWEMAIL_USER: ${{ secrets.CLAWEMAIL_USER }}
        run: python test_email.py
      
      - name: 上传邮件备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: email-backup
          path: email_backup/
