name: Health Monitor

# 实时健康守卫：每 6 小时对 RSSForge 做一轮维护级健康检查。
# 计算健康率、探测 0 内容活跃站点、检测硬死站，并据此自动创建/更新
# 唯一告警 Issue。报告以 artifact 形式留存（不污染 git 历史，避免与
# crawl / fast_check 的自动提交产生并发冲突）。
#
# 自愈闭环：
#   health-monitor(report)  --发现异常-->  自动 Issue 告警
#        |
#        | 每周日 weekly-maintenance(--deep) 应用修复（补全 url / 迁移硬死站）
#        v
#   freshness-watchdog 负责 feed 新鲜度自愈（已有）

on:
  schedule:
    - cron: '0 */6 * * *'      # 每 6 小时（UTC 0/6/12/18 = 北京 8/14/20/2 点）
  workflow_dispatch:

concurrency:
  group: health-monitor
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（仅 PyYAML）
        run: pip install -q pyyaml

      - name: 运行健康检查
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python agent-maintenance/maintain.py --report

      - name: 上传健康报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_number }}
          path: agent-maintenance/logs/
          retention-days: 14
