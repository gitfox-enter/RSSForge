name: Trigger Pages Rebuild

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

# Don't need its own build, just trigger pages deploy
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Request pages rebuild
        run: |
          echo "Triggering pages rebuild..."
          # Create a deployment to github-pages environment
          # This should trigger the pages-build-deployment system workflow
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            || echo "API trigger not available via this method"
          echo "Done - pages should rebuild via deployment trigger"
