name: 站点更新监控

on:
  # 定时触发：每4小时执行一次（北京时间 00:00, 04:00, 08:00, 12:00, 16:00, 20:00）
  schedule:
    - cron: '0 */4 * * *'
  
  # 手动触发（用于测试）
  workflow_dispatch:

# 同一时间只允许一个监控任务运行，避免并发 push 冲突
concurrency:
  group: site-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Shanghai
    
    permissions:
      contents: write
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 配置Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: 运行监控
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python crawl.py
      
      - name: 提交变更
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add hash_record.txt data/ index.html notified_items.json run_log.jsonl feed.xml paused_sites.json failed_sites.json 2>/dev/null || true
          if [ -d email_backup ]; then
            git add email_backup/ 2>/dev/null || true
          fi
          git status
          
          if git diff --staged --quiet 2>/dev/null; then
            echo "No changes to commit"
          else
            git commit -m "自动更新: $(TZ="Asia/Shanghai" date "+%Y-%m-%d %H:%M:%S")"
            push_success=false
            for i in 1 2 3; do
              if git rebase --abort 2>/dev/null; then
                echo "Aborted previous rebase state"
              fi
              if git pull --rebase --strategy-option=theirs origin main; then
                if git push origin main; then
                  push_success=true
                  break
                fi
                echo "Push attempt $i failed, retrying..."
              else
                echo "Pull rebase attempt $i had conflicts, aborting..."
                git rebase --abort 2>/dev/null || true
                if git pull --no-rebase --strategy-option=ours origin main; then
                  if git push origin main; then
                    push_success=true
                    break
                  fi
                fi
                git push --force-with-lease origin main && push_success=true && break
              fi
              sleep 5
            done
            if [ "$push_success" = true ]; then
              echo "✓ Changes committed and pushed successfully"
            else
              echo "✗ Failed to push changes after 3 attempts"
              exit 1
            fi
          fi
      
      - name: 上传邮件备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: email-backup-${{ github.run_number }}
          path: email_backup/
          retention-days: 30
