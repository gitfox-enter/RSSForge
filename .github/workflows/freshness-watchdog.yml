name: Freshness Watchdog

# 自愈守卫：检测 RSSForge 的 feed 是否新鲜；若 fast_check 被 GitHub 调度器漏触发导致 feed 长期未重建，
# 自动重新触发 fast_check，避免用户侧看到“长时间没有新内容”。
# 使用 GitHub 内置 GITHUB_TOKEN，无需外部 PAT，即使 agent 离线也能独立运行。
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检查 feed 新鲜度，过期则触发 fast_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import urllib.request, json, re, sys, datetime

          TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          REPO = "${{ github.repository }}"
          BASE = "https://gitfox-enter.github.io/RSSForge"

          # 1) 取所有 feed URL
          try:
              opml = urllib.request.urlopen(f"{BASE}/opml.xml", timeout=30).read().decode("utf-8", "ignore")
          except Exception as e:
              print("opml 抓取失败，跳过本次检查:", e)
              sys.exit(0)

          urls = re.findall(r'xmlUrl="([^"]+)"', opml)
          if not urls:
              print("未解析到 feed URL，跳过")
              sys.exit(0)

          now = datetime.datetime.now(datetime.timezone.utc)
          max_age_min = 0.0
          newest = None
          checked = 0
          for u in urls[:50]:
              try:
                  x = urllib.request.urlopen(u, timeout=20).read().decode("utf-8", "ignore")
              except Exception:
                  continue
              checked += 1
              m = re.search(r"<updated>(.*?)</updated>", x)
              if not m:
                  continue
              ts = m.group(1).strip()
              try:
                  if ts.endswith("Z"):
                      ts = ts[:-1] + "+00:00"
                  t = datetime.datetime.fromisoformat(ts)
              except Exception:
                  continue
              age = (now - t).total_seconds() / 60.0
              if age > max_age_min:
                  max_age_min = age
                  newest = ts

          print(f"检查了 {checked}/{len(urls)} 个 feed；最新一次 feed 重建时间: {newest}  距今约 {max_age_min:.1f} 分钟")

          # 2) 超过阈值（正常 fast_check 每 15 分钟一次，留足余量）则判定过期
          THRESHOLD = 55.0
          if max_age_min > THRESHOLD:
              print(f"检测到 feed 过期（>{THRESHOLD:.0f} 分钟），自动触发 fast_check ...")
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/actions/workflows/fast_check.yml/dispatches",
                  data=json.dumps({"ref": "main"}).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              try:
                  urllib.request.urlopen(req, timeout=30)
                  print("已触发 fast_check（workflow_dispatch）")
              except Exception as e:
                  print("触发 fast_check 失败:", e)
          else:
              print("feed 新鲜，无需操作")
          PY
