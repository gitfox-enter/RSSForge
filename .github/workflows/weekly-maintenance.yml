name: Weekly Maintenance

# 每周日北京时间 23:00 深度维护（也可手动 workflow_dispatch）。
# 运行维护引擎 --deep 模式：
#   1. 自动补全 feeds_meta.json 缺失的 url 字段（来自 sites.yaml，按 name 匹配）
#   2. 对「硬死站」（DNS 失败 / 连接被拒 / 连接超时 / HTTP 4xx / 空响应）
#      从 sites 的 active 列表迁移到 dead_sites（可逆操作，符合既有维护惯例）
#   3. 生成周报（agent-maintenance/weekly-report_YYYY-MM-DD.md）
#   4. 提交并推送，必要时创建/更新健康告警 Issue
#
# 说明：软故障（SPA / JS 重定向 / 5xx / SSL）仅报告，不自动迁移，
#       避免误伤可通过 js_render 恢复或临时抖动的站点。

on:
  schedule:
    - cron: '0 15 * * 0'      # 每周日 UTC 15:00 = 北京时间 23:00
  workflow_dispatch:

concurrency:
  group: weekly-maintenance
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（仅 PyYAML）
        run: pip install -q pyyaml

      - name: 配置 Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 运行深度维护
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python agent-maintenance/maintain.py --deep

      - name: 上传周报
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: agent-maintenance/logs/
          retention-days: 30
