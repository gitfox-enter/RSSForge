name: Debug Parsers

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run debug script
        run: python debug_parsers.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-report
          path: debug_report.json
          retention-days: 7

      - name: Print report
        if: always()
        run: cat debug_report.json
