name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["站点更新监控"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          for f in index.html status.html feed.xml crawl_status.json feeds_meta.json; do
            [ -f "$f" ] && cp "$f" _site/
          done
          # Per-site feeds
          if [ -d "feeds" ]; then
            mkdir -p _site/feeds
            cp feeds/*.xml _site/feeds/ 2>/dev/null || true
          fi
          # OPML files
          for f in opml.xml opml-*.xml; do
            [ -f "$f" ] && cp "$f" _site/
          done
          # Alipay red packet image
          if [ -f "public/alipay-redpacket.jpg" ]; then
            mkdir -p _site/public
            cp public/alipay-redpacket.jpg _site/public/
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
