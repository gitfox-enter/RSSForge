name: Deploy Simple Static Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          # 使用极简 index.html 替换默认的 index.html
          cp index-minimal.html index.html
          
          # 准备部署目录
          mkdir -p _site
          cp index.html _site/
          cp opml.xml _site/
          cp -r feeds _site/ || true
          cp -r icons _site/ || true
          cp -r public/* _site/ || true
          
          echo "部署文件列表："
          find _site -type f | head -20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
