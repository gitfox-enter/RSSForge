<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS 阅读器 - 无限条</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #fff; }
        .refresh { position: fixed; top: 10px; right: 10px; background: #2563eb; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .refresh:hover { background: #3b82f6; }
        .item { background: #2a2a2a; padding: 16px; margin-bottom: 12px; border-radius: 8px; border-left: 3px solid #2563eb; }
        .item:hover { background: #333; }
        .item a { color: #60a5fa; text-decoration: none; font-size: 16px; }
        .item a:hover { text-decoration: underline; }
        .item .desc { color: #9ca3af; margin-top: 8px; font-size: 14px; }
        .item .site { color: #6b7280; font-size: 12px; margin-top: 6px; }
        .item .date { color: #4b5563; font-size: 12px; margin-top: 4px; }
        .loading { text-align: center; color: #6b7280; padding: 40px; }
        .count { text-align: center; color: #6b7280; margin-bottom: 20px; }
    </style>
</head>
<body>
    <button class="refresh" onclick="loadRSS()">🔄 刷新</button>
    <h1>📰 RSS 阅读器</h1>
    <div class="count" id="count">加载中...</div>
    <div id="items">加载中...</div>

    <script>
        const RSS_URL = 'https://gitfox-enter.github.io/site-update-monitor/feed.xml';
        
        async function loadRSS() {
            document.getElementById('items').innerHTML = '<div class="loading">加载中...</div>';
            document.getElementById('count').textContent = '加载中...';
            
            try {
                const resp = await fetch(RSS_URL);
                const text = await resp.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'application/xml');
                const items = xml.querySelectorAll('item');
                
                let html = '';
                let count = 0;
                
                items.forEach(item => {
                    const title = item.querySelector('title')?.textContent || '';
                    const link = item.querySelector('link')?.textContent || '';
                    const desc = item.querySelector('description')?.textContent || '';
                    const date = item.querySelector('pubDate')?.textContent || '';
                    
                    // 提取站点名
                    const siteMatch = desc.match(/\[(.*?)\]/);
                    const site = siteMatch ? siteMatch[1] : '';
                    
                    if (title && link) {
                        count++;
                        html += `<div class="item">
                            <a href="${link}" target="_blank">${title}</a>
                            ${desc ? `<div class="desc">${desc.substring(0, 150)}...</div>` : ''}
                            ${site ? `<div class="site">📁 ${site}</div>` : ''}
                            ${date ? `<div class="date">🕐 ${date}</div>` : ''}
                        </div>`;
                    }
                });
                
                document.getElementById('count').textContent = `共 ${count} 条`;
                document.getElementById('items').innerHTML = html || '暂无内容';
                
            } catch (e) {
                document.getElementById('items').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
            }
        }
        
        loadRSS();
    </script>
</body>
</html>
